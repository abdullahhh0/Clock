<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>World Clock App</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body data-bs-theme="dark">

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
      <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="#">
          🌍 Clock
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse"
          id="navbarSupportedContent"
        >

          <ul class="navbar-nav me-auto mb-2 mb-lg-0">

            <li class="nav-item">
              <a class="nav-link active" href="#">
                Home
              </a>
            </li>

            <li class="nav-item dropdown">

              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
              >
                Countries
              </a>

              <ul
                class="dropdown-menu"
                id="countryDropdown"
              ></ul>

            </li>

          </ul>

          <!-- SEARCH -->

          <form
            class="d-flex"
            role="search"
            onsubmit="return false;"
          >

            <input
              id="searchInput"
              class="form-control me-2"
              type="search"
              placeholder="Search Country"
            />

            <button
              class="btn btn-outline-success"
              onclick="searchCountry()"
            >
              Search
            </button>

          </form>

        </div>

      </div>
    </nav>

    <!-- HERO -->

    <div class="container my-5">

      <div class="p-5 rounded-4 shadow glass-card text-center">

        <h1 class="display-4 fw-bold mb-3">
          Current Time is:
        </h1>

        <h2
          class="display-5 fw-bold"
          id="time"
        ></h2>

        <h3
          id="selectedCountry"
          class="text-info mt-3"
        >
          🇵🇰 Pakistan
        </h3>

        <p class="fs-4 mt-4">
          Check real-time world clocks for different countries 🌎
        </p>

        <button
          class="btn btn-lg btn-dark mt-3"
          onclick="toggleTheme()"
        >
          Toggle Theme
        </button>

      </div>

    </div>

    <!-- ANALOG CLOCK -->

    <div id="clock-face">

      <div id="hour-hand"></div>

      <div id="minute-hand"></div>

      <div id="second-hand"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="clock.js"></script>

  </body>
</html>
